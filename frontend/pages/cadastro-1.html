<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Passo 1</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>NiceJobs</h1>
            <img src="../img/logo.jpg" alt="Logo da empresa">
        </div>
        <div class="form-container">
            <h1>Criar conta</h1>
            <form id="form1">
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="text" id="cpf" placeholder="CPF" maxlength="14" required>
                <input type="date" id="data-nascimento" placeholder="Data de Nascimento" required>
                <button type="button">Próxima</button>
            </form>
        </div>
    </div>
    <script src="../js/scripts.js"></script>
</body>
</html>
